[package]
name = "nidus-example-integrations-production"
version = "1.0.5"
edition = "2024"
publish = false

[dependencies]
nidus = { package = "nidus-rs", path = "../../crates/nidus", version = "1.0.5", features = ["http", "config", "observability"] }
nidus-cache = { path = "../../crates/nidus-cache", version = "1.0.5", features = ["health", "observability"] }
nidus-sqlx = { path = "../../crates/nidus-sqlx", version = "1.0.5", features = ["sqlite", "health", "observability"] }
tokio.workspace = true
