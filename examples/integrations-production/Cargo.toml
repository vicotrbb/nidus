[package]
name = "nidus-example-integrations-production"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
nidus = { path = "../../crates/nidus", version = "0.1.0", features = ["http", "config"] }
nidus-cache = { path = "../../crates/nidus-cache", version = "0.1.0", features = ["health"] }
nidus-sqlx = { path = "../../crates/nidus-sqlx", version = "0.1.0", features = ["sqlite", "health"] }
tokio.workspace = true
