[package]
name = "nidus-example-realworld-api"
version = "1.0.10"
edition = "2024"
publish = false

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
axum.workspace = true
nidus = { package = "nidus-rs", path = "../../crates/nidus", version = "1.0.10", features = ["auth", "config", "events", "jobs", "observability", "openapi", "otel", "validation"] }
serde.workspace = true
serde_json.workspace = true
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "sqlite"] }
tokio.workspace = true
tracing.workspace = true
utoipa.workspace = true
garde.workspace = true

[dev-dependencies]
nidus-testing = { path = "../../crates/nidus-testing", version = "1.0.10" }
