[package]
name = "nidus-example-realworld-api"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
axum.workspace = true
nidus = { path = "../../crates/nidus", version = "0.1.0", features = ["auth", "openapi", "validation"] }
nidus-openapi = { path = "../../crates/nidus-openapi", version = "0.1.0" }
serde.workspace = true
serde_json.workspace = true
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "sqlite"] }
tokio.workspace = true
tower-http.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
utoipa.workspace = true
validator.workspace = true

[dev-dependencies]
nidus-testing = { path = "../../crates/nidus-testing", version = "0.1.0" }
