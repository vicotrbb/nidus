[package]
name = "nidus-external-support-desk"
version = "0.1.0"
edition = "2024"
publish = false

[workspace]

[dependencies]
nidus = { package = "nidus-rs", version = "1.0.15", features = ["http"] }
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
nidus-testing = "1.0.15"
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
