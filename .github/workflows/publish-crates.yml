name: publish crates

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run validation and package checks without uploading crates'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish crates.io packages
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal
          rustup default 1.96.0
          rustup component add rustfmt clippy
      - name: Check release tag
        if: ${{ github.event_name == 'push' }}
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "nidus-rs") | .version')"
          tag="${GITHUB_REF_NAME#v}"
          if [ "${tag}" != "${version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match workspace version ${version}." >&2
            exit 1
          fi
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-publish-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-publish-${{ runner.os }}-
      - name: Check crates.io token is configured
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN is not configured." >&2
            exit 1
          fi
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features
      - name: Docs
        run: cargo doc --workspace --all-features --no-deps
      - name: Package registry-independent crates
        run: |
          set -euo pipefail
          crates=(
            nidus-core
            nidus-macros
            nidus-config
            nidus-auth
            nidus-events
            nidus-jobs
            nidus-validation
            cargo-nidus
          )
          for crate in "${crates[@]}"; do
            cargo package -p "${crate}"
          done
      - name: Stop after dry run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: echo "Dry run requested; validation and registry-independent package preflight completed without publishing."
      - name: Publish crates
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN is not configured." >&2
            exit 1
          fi

          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "nidus-rs") | .version')"

          is_published() {
            local crate="$1"
            local response
            response="$(
              curl \
                --fail \
                --silent \
                --show-error \
                --header "User-Agent: nidus-release" \
                "https://crates.io/api/v1/crates/${crate}" 2>/dev/null || true
            )"

            if [ -z "${response}" ]; then
              return 1
            fi

            jq -e --arg version "${version}" \
              '.versions[]? | select(.num == $version and (.yanked | not))' \
              >/dev/null <<<"${response}"
          }

          wait_for_crate() {
            local crate="$1"
            for attempt in {1..30}; do
              if is_published "${crate}"; then
                return 0
              fi
              echo "Waiting for ${crate} ${version} to appear in the crates.io index (${attempt}/30)."
              sleep 10
            done

            echo "${crate} ${version} did not appear in the crates.io index in time." >&2
            exit 1
          }

          sleep_for_rate_limit() {
            local output="$1"
            local retry_after
            local target_epoch
            local now_epoch
            local sleep_seconds

            retry_after="$(sed -n 's/.*Please try again after \(.* GMT\) and see.*/\1/p' <<<"${output}" | tail -n 1)"
            if [ -n "${retry_after}" ]; then
              target_epoch="$(date -u -d "${retry_after}" +%s 2>/dev/null || true)"
              now_epoch="$(date -u +%s)"
              if [ -n "${target_epoch}" ] && [ "${target_epoch}" -gt "${now_epoch}" ]; then
                sleep_seconds=$((target_epoch - now_epoch + 15))
                echo "Sleeping ${sleep_seconds}s until after crates.io retry window (${retry_after})."
                sleep "${sleep_seconds}"
                return 0
              fi
            fi

            echo "Sleeping 60s before retrying crates.io publish."
            sleep 60
          }

          publish_one() {
            local crate="$1"
            local max_attempts=20
            echo "::group::Publishing ${crate}"
            if is_published "${crate}"; then
              echo "${crate} ${version} is already published; skipping upload."
              echo "::endgroup::"
              return 0
            fi

            for attempt in $(seq 1 "${max_attempts}"); do
              set +e
              output="$(cargo publish -p "${crate}" 2>&1)"
              status="$?"
              set -e
              printf '%s\n' "${output}"

              if [ "${status}" -eq 0 ]; then
                wait_for_crate "${crate}"
                echo "::endgroup::"
                return 0
              fi

              if is_published "${crate}"; then
                echo "${crate} ${version} is already published after publish response; continuing."
                echo "::endgroup::"
                return 0
              fi

              if printf '%s\n' "${output}" | grep -q "Too Many Requests"; then
                echo "crates.io rate limit hit while publishing ${crate}; retrying (${attempt}/${max_attempts})."
                if [ "${attempt}" -ge "${max_attempts}" ]; then
                  break
                fi
                sleep_for_rate_limit "${output}"
                continue
              fi

              echo "::endgroup::"
              return "${status}"
            done

            echo "Exceeded publish retry limit for ${crate}." >&2
            echo "::endgroup::"
            exit 1
          }

          publish_one nidus-core
          publish_one nidus-macros
          publish_one nidus-config
          publish_one nidus-auth
          publish_one nidus-events
          publish_one nidus-jobs
          publish_one nidus-validation
          publish_one nidus-http
          publish_one nidus-testing
          publish_one nidus-openapi
          publish_one nidus-observability
          publish_one nidus-rs
          publish_one nidus-cache
          publish_one nidus-sqlx
          publish_one cargo-nidus
