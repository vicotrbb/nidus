name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0
      - name: Install Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal
          rustup default 1.96.0
          rustup component add rustfmt clippy
      - name: Install native Kafka build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes libcurl4-openssl-dev
      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # actions/cache@v6.1.0
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features
      - name: Integration feature matrix
        run: bash scripts/check-integration-feature-matrix.sh
      - name: Docs
        run: cargo doc --workspace --all-features --no-deps
      - name: List package files for publishable crates
        run: bash scripts/package-publishable-crates.sh --list-only
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Build fuzz targets
        run: |
          rustup toolchain install nightly --profile minimal
          cargo +nightly fuzz build

  policy:
    name: dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0
      - name: Install Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal
          rustup default 1.96.0
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Check dependencies
        run: cargo deny check
      - name: Audit RustSec advisories
        run: bash scripts/audit-dependencies.sh

  live-integrations:
    name: live integration services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0
      - name: Install Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal
          rustup default 1.96.0
      - name: Install native Kafka build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes libcurl4-openssl-dev
      - name: Test first-party service adapters and cleanup
        run: bash scripts/test-integration-services.sh

  website:
    name: website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # actions/setup-node@v7.0.0
        with:
          node-version: '24'
      - name: Verify website
        working-directory: website
        run: npm run verify
